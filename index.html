<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=1">
<meta name="theme-color" content="#0a0a0b">
<title>TubChat</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --accent: #f97316;
  --accent-dim: rgba(249,115,22,.14);
  --accent-hover: #ea6c0a;
  --bg: #0a0a0b;
  --card: #141417;
  --input-bg: rgba(255,255,255,.04);
  --border: rgba(255,255,255,.09);
  --border-hover: rgba(255,255,255,.18);
  --text: #f4f4f5;
  --text-2: #a1a1aa;
  --text-3: #52525b;
  --r: 11px;
  --safe-t: max(24px, env(safe-area-inset-top));
  --safe-b: max(24px, env(safe-area-inset-bottom));
}
*, *::before, *::after {
  margin: 0; padding: 0; box-sizing: border-box;
  font-family: "Inter", -apple-system, BlinkMacSystemFont, sans-serif;
  -webkit-tap-highlight-color: transparent;
}
html, body { height: 100%; }
body {
  min-height: 100dvh;
  background: var(--bg);
  color: var(--text);
  display: flex;
  align-items: center;
  justify-content: center;
  padding: var(--safe-t) 20px var(--safe-b);
}
.card {
  width: 100%;
  max-width: 400px;
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 18px;
  padding: 40px 32px 36px;
  box-shadow: 0 8px 48px rgba(0,0,0,.55);
}

/* Brand */
.brand {
  text-align: center;
  margin-bottom: 32px;
}
.brand-name {
  font-size: 24px;
  font-weight: 700;
  letter-spacing: -.03em;
  color: var(--text);
}
.brand-name em { font-style: normal; color: var(--accent); }
.brand-tag {
  font-size: 12px;
  color: var(--text-3);
  margin-top: 5px;
}

/* Sections */
.section { display: none; flex-direction: column; gap: 10px; }
.section.active { display: flex; }
@keyframes fadeUp {
  from { opacity: 0; transform: translateY(6px); }
  to   { opacity: 1; transform: translateY(0); }
}
.section.active { animation: fadeUp .2s ease; }

/* Section header */
.sec-head { margin-bottom: 6px; }
.sec-head h2 {
  font-size: 17px;
  font-weight: 600;
  letter-spacing: -.02em;
}
.sec-head h2 span { color: var(--accent); }
.sec-head p {
  font-size: 13px;
  color: var(--text-2);
  margin-top: 4px;
  line-height: 1.45;
}

/* Field */
.field { display: flex; flex-direction: column; gap: 6px; }
.field label {
  font-size: 11px;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: .06em;
  color: var(--text-3);
}
.field input {
  width: 100%;
  padding: 11px 13px;
  font-size: 14px;
  font-weight: 500;
  color: var(--text);
  background: var(--input-bg);
  border: 1px solid var(--border);
  border-radius: var(--r);
  outline: none;
  transition: border-color .15s, box-shadow .15s, background .15s;
}
.field input:hover { border-color: var(--border-hover); }
.field input:focus {
  border-color: var(--accent);
  background: rgba(249,115,22,.04);
  box-shadow: 0 0 0 3px var(--accent-dim);
}
.field input::placeholder { color: var(--text-3); }

/* Error */
.err {
  font-size: 12px;
  font-weight: 500;
  color: #f87171;
  min-height: 16px;
}

/* Buttons */
.btn {
  display: block;
  width: 100%;
  padding: 11px 16px;
  border: none;
  border-radius: var(--r);
  font-size: 14px;
  font-weight: 600;
  cursor: pointer;
  transition: background .15s, border-color .15s, color .15s, transform .1s;
  line-height: 1.4;
}
.btn:active { transform: scale(.985); }
.btn-primary { background: var(--accent); color: #fff; }
.btn-primary:hover { background: var(--accent-hover); }
.btn-outline {
  background: transparent;
  color: var(--text-2);
  border: 1px solid var(--border);
}
.btn-outline:hover {
  background: rgba(255,255,255,.04);
  color: var(--text);
  border-color: var(--border-hover);
}

/* Room created code display */
.code-box {
  background: rgba(249,115,22,.07);
  border: 1px solid rgba(249,115,22,.22);
  border-radius: var(--r);
  padding: 20px 16px;
  text-align: center;
}
#createdCode {
  display: block;
  font-size: 28px;
  font-weight: 700;
  letter-spacing: .12em;
  color: var(--accent);
}
.code-hint {
  font-size: 12px;
  color: var(--text-3);
  margin-top: 6px;
}

/* Divider */
.or {
  display: flex;
  align-items: center;
  gap: 10px;
  font-size: 11px;
  font-weight: 500;
  color: var(--text-3);
  margin: 2px 0;
}
.or::before, .or::after {
  content: "";
  flex: 1;
  height: 1px;
  background: var(--border);
}
</style>
</head>
<body>

<div class="card">
  <div class="brand">
    <div class="brand-name">Tub<em>Chat</em></div>
    <div class="brand-tag">Private room messaging</div>
  </div>

  <div id="homeSection" class="section active">
    <div class="field">
      <label for="roomCodeHome">Room code</label>
      <input type="text" id="roomCodeHome" maxlength="16" autocomplete="off"
             placeholder="Enter room code" autocapitalize="characters">
      <div class="err" id="roomCodeError" aria-live="polite"></div>
    </div>
    <button type="button" class="btn btn-primary" onclick="validateAndAskName()">Join room</button>
    <div class="or">or</div>
    <button type="button" class="btn btn-outline" onclick="startCreateFlow()">Create a new room</button>
  </div>

  <div id="joinSection" class="section">
    <div class="sec-head">
      <h2 id="nameTitle">Join <span>room</span></h2>
      <p id="nameSub">Enter your display name.</p>
    </div>
    <div class="field">
      <label for="usernameInput">Your name</label>
      <input type="text" id="usernameInput" maxlength="24"
             autocomplete="nickname" placeholder="How you appear in the room">
    </div>
    <button type="button" class="btn btn-primary" onclick="completeRoomEntry()">Continue</button>
    <button type="button" class="btn btn-outline" onclick="goBack()">Back</button>
  </div>

  <div id="createdSection" class="section">
    <div class="sec-head">
      <h2>Room <span>created</span></h2>
      <p>Share this code with people you want to invite.</p>
    </div>
    <div class="code-box">
      <span id="createdCode">—</span>
      <div class="code-hint">Room code</div>
    </div>
    <button type="button" class="btn btn-outline" id="shareBtn" onclick="shareRoomCode()">Share code</button>
    <button type="button" class="btn btn-primary" onclick="enterCreatedRoom()">Go to chat</button>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
const roomWords=[
"LION","BEAR","WOLF","DEER","FROG","TOAD","GOAT","MULE","SEAL","CRAB",
"CLAM","TUNA","BASS","SWAN","DOVE","HAWK","CROW","WREN","MOTH","ANTS",
"BOWL","CUPS","MUGS","FORK","SPOON","KNIF","LAMP","DOOR","LOCK","KEYS",
"BELL","BOOK","PAGE","CARD","COIN","RING","ROPE","TAPE","GLUE","NAIL",
"SCRE","BOLT","WIRE","CORD","PLUG","SOCK","BOOT","COAT","HATS","MASK",
"DESK","SEAT","SOFA","RUGS","VASE","JARS","PANS","POTS","TRAY","BINS",
"CAKE","PIES","TART","BUNS","ROLL","LOAF","RICE","BEAN","PEAR","PLUM",
"KIWI","LIME","MINT","CORN","KALE","OKRA","YAMS","DATE","FIGS","NUTS",
"MILK","SODA","JUIC","TEAS","SOUP","STEW","TACO","PITA","TOFU","EGGS",
"STAR","MOON","WIND","RAIN","SNOW","WAVE","SAND","ROCK","CAVE","TREE",
"LEAF","FERN","MOSS","VINE","ROSE","LILY","IRIS","IVY","REED","BARK",
"SHIP","BOAT","RAIL","ROAD","LANE","PATH","BRDG","TOWN","CITY","PARK",
"YARD","GATE","WALL","ROOF","HOME","HALL","ROOM","NEST","DENN","COVE"
];

const SUPABASE_URL="https://gvvowenjfiiruyzncigb.supabase.co";
const SUPABASE_KEY="sb_publishable_noeSDPOFwrIUXBpBiisrQg_tHtnN8aR";
const sb=window.supabase.createClient(SUPABASE_URL,SUPABASE_KEY,{
realtime:{params:{eventsPerSecond:10}}
});

function generateRoomCode(){
const word=roomWords[Math.floor(Math.random()*roomWords.length)];
const num=Math.floor(100+Math.random()*900);
return word+num;
}

let pendingRoomCode="";
let pendingMode="join";

function isValidRoomCode(code){
return /^[A-Z]{4}\d{3}$/.test(code);
}

function showNameStep(title,subtitle){
document.getElementById("nameTitle").innerHTML=title;
document.getElementById("nameSub").textContent=subtitle;
document.getElementById("homeSection").classList.remove("active");
document.getElementById("joinSection").classList.add("active");
document.getElementById("usernameInput").focus();
}

function validateAndAskName(){
const errEl=document.getElementById("roomCodeError");
errEl.textContent="";
const code=document.getElementById("roomCodeHome").value.trim().toUpperCase().replace(/\s+/g,"");
if(!isValidRoomCode(code)){
errEl.textContent="Sorry, invalid room code.";
return;
}
pendingMode="join";
pendingRoomCode=code;
showNameStep("Join <span>room</span>","Enter your display name.");
}

function startCreateFlow(){
pendingMode="create";
pendingRoomCode=generateRoomCode();
showNameStep("Create <span>room</span>","Enter your display name.");
}

function goBack(){
document.getElementById("joinSection").classList.remove("active");
document.getElementById("homeSection").classList.add("active");
}

function goRoom(username,roomCode,roomId){
localStorage.setItem("tubzi_username",username);
localStorage.setItem("tubzi_roomCode",roomCode);
localStorage.setItem("tubzi_roomId",roomId);
window.location.href="room.html";
}

function mapError(message){
const m=String(message||"");
if(m.includes("room_not_found"))return"That room code does not exist.";
if(m.includes("room_full"))return"Room is full (25 max).";
if(m.includes("invalid_username"))return"Pick a username (1-24 chars).";
return m||"Something went wrong. Please try again.";
}

async function ensureAuth(){
const sess=await sb.auth.getSession();
if(sess.data.session)return;
await sb.auth.signInAnonymously();
}

function extractPayload(data){
if(Array.isArray(data))return data[0]||null;
return data||null;
}

function enterCreatedRoom(){
window.location.href="room.html";
}

function shareRoomCode(){
const code=document.getElementById("createdCode").textContent;
const btn=document.getElementById("shareBtn");
if(navigator.share){
navigator.share({title:"TubChat",text:"Join my room with code: "+code}).catch(function(){});
return;
}
navigator.clipboard.writeText(code).then(function(){
btn.textContent="Copied!";
setTimeout(function(){ btn.textContent="Share code"; },2000);
}).catch(function(){
btn.textContent="Copy failed";
setTimeout(function(){ btn.textContent="Share code"; },2000);
});
}

async function completeRoomEntry(){
const username=document.getElementById("usernameInput").value.trim();
if(!username){
alert("Enter a display name to continue.");
return;
}
if(!pendingRoomCode){
alert("Choose a room first.");
return;
}
try{
await ensureAuth();
let roomCode=pendingRoomCode;
let roomId="";

if(pendingMode==="create"){
const out=await sb.rpc("create_room",{p_username:username});
if(out.error)throw out.error;
const payload=extractPayload(out.data);
if(!payload||!payload.room_id||!payload.room_code)throw new Error("Could not create room.");
roomCode=String(payload.room_code).toUpperCase();
roomId=String(payload.room_id);
localStorage.setItem("tubzi_username",username);
localStorage.setItem("tubzi_roomCode",roomCode);
localStorage.setItem("tubzi_roomId",roomId);
document.getElementById("createdCode").textContent=roomCode;
document.getElementById("joinSection").classList.remove("active");
document.getElementById("createdSection").classList.add("active");
return;
}else{
const out=await sb.rpc("join_room",{p_code:pendingRoomCode,p_username:username});
if(out.error)throw out.error;
const payload=extractPayload(out.data);
if(payload&&typeof payload==="object"&&payload.room_id){
roomId=String(payload.room_id);
}else if(payload&&typeof payload==="string"){
roomId=payload;
}
if(!roomId)throw new Error("Unable to join room.");
}

goRoom(username,roomCode,roomId);
}catch(err){
alert(mapError(err&&err.message));
}
}
</script>
</body>
</html>
